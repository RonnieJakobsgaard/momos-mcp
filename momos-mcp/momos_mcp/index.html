<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Review</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
<script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .d2h-file-wrapper { margin-bottom: 1.5rem; }
  .diff-scroll-container { overflow-x: auto; overflow-y: clip; scrollbar-width: none; -ms-overflow-style: none; }
  .diff-scroll-container::-webkit-scrollbar { display: none; }
  .diff-scroll-container .d2h-file-side-diff { overflow: visible !important; width: auto !important; }
  .diff-scroll-container .d2h-files-diff { width: max-content; }
  .phantom-scrollbar-wrap { position: sticky; bottom: 0; overflow-x: auto; overflow-y: hidden; height: 14px; z-index: 2; background: #f9fafb; }
  .phantom-scrollbar-inner { height: 1px; }
  .inline-comment-box { background: #fffbdd; border: 1px solid #e6c84a; border-radius: 4px; padding: 8px; margin: 4px 0; position: sticky; left: 1rem; max-width: min(600px, calc(100vw - 2rem)); }
  .resolved-badge { display: inline-flex; align-items: center; gap: 4px; background: #d1fae5; color: #065f46; border-radius: 9999px; padding: 2px 8px; font-size: 0.75rem; }
  .comment-thread { background: #eef2ff; border: 1px solid #c7d2fe; border-left: 3px solid #6366f1; border-radius: 0 6px 6px 0; padding: 8px 12px; margin: 3px 0; font-size: 0.85rem; max-width: 600px; box-shadow: 0 1px 3px rgba(99,102,241,0.08); }
  .comment-thread.ai-comment { background: #faf5ff; border-color: #e9d5ff; border-left-color: #a855f7; }
  td[data-file] { cursor: pointer; }
  td[data-file]:hover { background: rgba(99,102,241,0.08) !important; }
  .d2h-code-linenumber { background-color: #f9fafb !important; }
  #file-tree a:hover { background: #e0e7ff; }
  #file-tree a.active { background: #e0e7ff; font-weight: 600; }
  .expand-ctx-cell { background: #f1f5f9; padding: 1px 0; text-align: center; }
  .expand-ctx-btn { font-size: 0.68rem; color: #94a3b8; padding: 1px 10px; border-radius: 3px; cursor: pointer; letter-spacing: 0.02em; }
  .expand-ctx-btn:hover { background: #e0e7ff; color: #4338ca; }
  .expand-ctx-line td { background: #f8fafc !important; }
  .comment-type-selector [data-type] { padding: 2px 8px; font-size: 0.7rem; border-radius: 4px; border: 1px solid #d1d5db; color: #9ca3af; cursor: pointer; transition: all .15s; background: #fff; }
  .comment-type-selector [data-type]:hover { border-color: #9ca3af; color: #6b7280; }
  .comment-type-selector[data-selected="nitpick"]    [data-type="nitpick"]    { background: #374151; color: #fff; border-color: #374151; font-weight: 600; }
  .comment-type-selector[data-selected="suggestion"] [data-type="suggestion"] { background: #4f46e5; color: #fff; border-color: #4f46e5; font-weight: 600; }
  .comment-type-selector[data-selected="blocker"]    [data-type="blocker"]    { background: #dc2626; color: #fff; border-color: #dc2626; font-weight: 600; }
  .type-badge { display:inline-flex; align-items:center; padding: 1px 7px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
  .type-badge-nitpick    { background:#e5e7eb; color:#374151; border:1px solid #9ca3af; }
  .type-badge-suggestion { background:#e0e7ff; color:#3730a3; border:1px solid #6366f1; }
  .type-badge-blocker    { background:#fee2e2; color:#991b1b; border:1px solid #ef4444; }

  /* ── Dark mode transition ── */
  html { transition: background-color 0.25s ease, color 0.25s ease; }
  body, header, aside, main, .d2h-file-wrapper, .d2h-file-header,
  .d2h-diff-table, .inline-comment-box, .comment-thread,
  #overview-panel, #overview-panel .bg-white {
    transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  }

  /* ── Dark mode ── */
  .dark body { background:#0f1117; color:#e2e8f0; }
  /* Header */
  .dark header { background:#1a1d27; border-color:#2d3148; }
  .dark #tab-switcher, .dark #format-toggle { border-color:#3d4060; }
  .dark #tab-switcher button, .dark #format-toggle button { color:#94a3b8; }
  .dark #tab-switcher button:hover, .dark #format-toggle button:hover { background:#2d3148; }
  .dark #tab-switcher .border-l, .dark #format-toggle .border-l { border-color:#3d4060; }
  .dark #btn-changes { border-color:#7f1d1d; color:#fca5a5; }
  .dark #btn-changes:hover { background:#450a0a; }
  .dark #btn-approve { background:#166534; }
  .dark #btn-approve:hover { background:#14532d; }
  .dark button[class*="border-gray-300"] { border-color:#3d4060; color:#94a3b8; }
  .dark button[class*="border-gray-300"]:hover { background:#2d3148; }
  .dark #ref-range { color:#64748b; }
  .dark #comment-count { color:#64748b; }
  .dark #unsaved-warning { background:#422006; border-color:#92400e; color:#fde68a; }
  /* Title tile */
  .dark #title-tile { background:#1e1b4b; border-color:#312e81; }
  .dark #title-text { color:#c7d2fe; }
  /* File tree */
  .dark aside#file-tree { background:#13151f; border-color:#2d3148; }
  .dark #file-tree a { color:#818cf8; }
  .dark #file-tree a:hover { background:#1e2035; }
  .dark #file-tree a.active { background:#1e2035; }
  .dark #file-tree .text-gray-500 { color:#64748b; }
  /* Diff area */
  .dark #diff-area { background:#0f1117; }
  .dark .phantom-scrollbar-wrap { background:#1a1d27; }
  .dark .expand-ctx-cell { background:#1a1d27; }
  .dark .expand-ctx-btn { color:#475569; }
  .dark .expand-ctx-btn:hover { background:#1e2035; color:#818cf8; }
  .dark .expand-ctx-line td { background:#161922 !important; }
  .dark .d2h-code-linenumber { background-color:#1a1d27 !important; }
  /* diff2html overrides */
  .dark .d2h-wrapper { background:#0f1117; }
  .dark .d2h-file-wrapper { background:#161922; border-color:#2d3148; }
  .dark .d2h-file-header { background:#1a1d27 !important; border-color:#2d3148 !important; color:#e2e8f0 !important; }
  .dark .d2h-file-name { color:#c7d2fe !important; }
  .dark .d2h-tag { background:#1e2035 !important; color:#94a3b8 !important; border-color:#3d4060 !important; }
  .dark .d2h-diff-table { background:#161922; color:#e2e8f0; }
  .dark .d2h-code-side-linenumber { background:#1a1d27 !important; color:#475569 !important; border-color:#2d3148 !important; }
  .dark .d2h-code-linenumber { background:#1a1d27 !important; color:#475569 !important; border-color:#2d3148 !important; }
  .dark .d2h-code-side-diff, .dark .d2h-code-line { background:#161922; color:#e2e8f0; }
  .dark .d2h-ins { background:#0d2a1f !important; }
  .dark .d2h-ins .d2h-code-side-linenumber, .dark .d2h-ins .d2h-code-linenumber { background:#0d2a1f !important; border-color:#134d35 !important; }
  .dark .d2h-ins .d2h-code-side-diff, .dark .d2h-ins td { background:#0d2a1f !important; }
  .dark .d2h-ins mark { background:#1a4a2e; color:#86efac; border-radius:2px; }
  .dark .d2h-del { background:#2d0f0f !important; }
  .dark .d2h-del .d2h-code-side-linenumber, .dark .d2h-del .d2h-code-linenumber { background:#2d0f0f !important; border-color:#5a1a1a !important; }
  .dark .d2h-del .d2h-code-side-diff, .dark .d2h-del td { background:#2d0f0f !important; }
  .dark .d2h-del mark { background:#5a1a1a; color:#fca5a5; border-radius:2px; }
  .dark .d2h-cntx { background:#161922 !important; }
  .dark .d2h-cntx td { background:#161922 !important; }
  .dark .d2h-info { background:#1a1d27 !important; color:#64748b !important; border-color:#2d3148 !important; }
  .dark td[data-file]:hover { background:rgba(99,102,241,0.15) !important; }
  /* Comments */
  .dark .inline-comment-box { background:#1e2035; border-color:#3d4060; }
  .dark .inline-comment-box textarea { background:#13151f; color:#e2e8f0; border-color:#3d4060; }
  .dark .comment-thread { background:#1a1d27; border-color:#3d4060; border-left-color:#6366f1; color:#e2e8f0; }
  .dark .comment-thread.ai-comment { background:#1e1530; border-color:#4c1d95; border-left-color:#a855f7; }
  .dark .resolved-badge { background:#052e16; color:#4ade80; }
  .dark .comment-type-selector [data-type] { background:#1a1d27; border-color:#3d4060; color:#64748b; }
  .dark .comment-type-selector [data-type]:hover { border-color:#6366f1; color:#94a3b8; }
  .dark .type-badge-nitpick    { background:#1f2937; color:#9ca3af; border-color:#374151; }
  .dark .type-badge-suggestion { background:#1e1b4b; color:#a5b4fc; border-color:#4338ca; }
  .dark .type-badge-blocker    { background:#450a0a; color:#fca5a5; border-color:#991b1b; }
  /* Overview panel */
  .dark #overview-panel { background:#0f1117; }
  .dark #overview-panel h2 { color:#64748b; }
  .dark #overview-panel .bg-white { background:#1a1d27 !important; border-color:#2d3148 !important; }
  .dark #overview-panel .text-gray-800 { color:#e2e8f0 !important; }
  .dark #overview-panel .text-gray-700 { color:#94a3b8 !important; }
  .dark #overview-panel .text-gray-500 { color:#64748b !important; }
  .dark #overview-panel .text-gray-400 { color:#475569 !important; }
  .dark #overview-panel .text-indigo-500 { color:#818cf8 !important; }
  .dark #overview-panel textarea { background:#13151f; color:#e2e8f0; border-color:#2d3148; }
  .dark #overview-panel button.bg-indigo-600 { background:#4338ca; }
  .dark #overview-panel button.bg-indigo-600:hover { background:#3730a3; }
  .dark #overview-panel .border-indigo-400 { border-color:#6366f1 !important; }
  .dark #overview-panel .hover\:border-indigo-400:hover { border-color:#6366f1 !important; }
  /* Reply form */
  .dark [id^="reply-form-"] textarea { background:#13151f; color:#e2e8f0; border-color:#3d4060; }
  .dark [id^="reply-form-"] button.bg-indigo-600 { background:#4338ca; }
  .dark [id^="reply-form-"] button.bg-indigo-600:hover { background:#3730a3; }
  .dark [id^="reply-form-"] button.border { border-color:#3d4060; color:#94a3b8; background:#1a1d27; }
  /* Edit form */
  .dark .inline-edit textarea { background:#13151f; color:#e2e8f0; border-color:#3d4060; }
  .dark [class*="comment-text-"] textarea { background:#13151f; color:#e2e8f0; border-color:#3d4060; }
  .dark [class*="comment-text-"] button.bg-indigo-600 { background:#4338ca; }
  .dark [class*="comment-text-"] button.border { border-color:#3d4060; color:#94a3b8; background:#1a1d27; }
  /* Approve file btn */
  .dark .approve-file-btn { border-color:#166534; color:#4ade80; }
  .dark .approve-file-btn:hover { background:#052e16; }
  /* Status badges */
  .dark .bg-yellow-100 { background:#422006 !important; }
  .dark .text-yellow-800 { color:#fde68a !important; }
  .dark .bg-green-100 { background:#052e16 !important; }
  .dark .text-green-800 { color:#4ade80 !important; }
  .dark .bg-red-100 { background:#450a0a !important; }
  .dark .text-red-800 { color:#fca5a5 !important; }
  .dark .bg-purple-100 { background:#2e1065 !important; }
  .dark .text-purple-700 { color:#d8b4fe !important; }
  .dark .text-green-600 { color:#4ade80 !important; }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<!-- Top bar -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 py-3 flex items-center justify-between shadow-sm">
  <div class="flex items-center gap-3">
    <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    <span class="font-semibold text-lg">PR Review</span>
    <span id="ref-range" class="text-xs text-gray-500 font-mono"></span>
    <span id="status-badge" class="px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Pending</span>
    <div id="tab-switcher" class="flex rounded-md border border-gray-300 overflow-hidden text-xs font-medium">
      <button id="btn-tab-overview" onclick="switchTab('overview')" class="px-3 py-1.5 transition">Overview</button>
      <button id="btn-tab-diff" onclick="switchTab('diff')" class="px-3 py-1.5 border-l border-gray-300 transition">Diff</button>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <span id="comment-count" class="text-sm text-gray-500"></span>
    <div id="format-toggle" class="flex rounded-md border border-gray-300 overflow-hidden text-xs font-medium">
      <button id="btn-fmt-side" onclick="setDiffFormat('side-by-side')"
        class="px-3 py-1.5 transition">Side by side</button>
      <button id="btn-fmt-unified" onclick="setDiffFormat('line-by-line')"
        class="px-3 py-1.5 border-l border-gray-300 transition">Unified</button>
    </div>
    <div id="unsaved-warning" class="hidden flex items-center gap-2 px-3 py-1.5 rounded-md bg-amber-50 border border-amber-300 text-amber-800 text-xs font-medium">
      <span>⚠ Unsaved comment</span>
      <button id="unsaved-proceed" class="underline hover:text-amber-900 whitespace-nowrap">Proceed anyway</button>
      <button onclick="dismissUnsavedWarning()" class="ml-1 text-amber-500 hover:text-amber-800 font-bold">×</button>
    </div>
    <button id="btn-dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode"
      class="px-2 py-1.5 rounded-md border border-gray-300 text-gray-500 hover:bg-gray-50 text-xs font-medium transition">🌙</button>
    <button onclick="toggleShortcutLegend()" title="Keyboard shortcuts (?)"
      class="px-2 py-1.5 rounded-md border border-gray-300 text-gray-500 hover:bg-gray-50 text-xs font-medium transition">?</button>
    <button id="btn-changes" onclick="submitStatus('changes_requested')"
      class="px-4 py-1.5 rounded-md border border-red-300 text-red-700 hover:bg-red-50 text-sm font-medium transition">
      Request Changes
    </button>
    <button id="btn-approve" onclick="submitStatus('approved')"
      class="px-4 py-1.5 rounded-md bg-green-600 text-white hover:bg-green-700 text-sm font-medium transition">
      Approve
    </button>
  </div>
</header>

<!-- Title tile (hidden when no title) -->
<div id="title-tile" class="hidden bg-indigo-50 border-b border-indigo-100 px-6 py-2">
  <p id="title-text" class="text-sm font-medium text-indigo-800"></p>
</div>

<div id="main-panels" class="h-[calc(100vh-57px)] relative">

  <!-- Diff panel: file tree + diff area -->
  <div id="diff-panel" class="flex h-full">
    <aside id="file-tree" class="w-64 shrink-0 bg-white border-r border-gray-200 overflow-y-auto p-3">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2 px-2">Files Changed</p>
      <div id="file-list" class="space-y-0.5"></div>
    </aside>
    <main class="flex-1 overflow-y-auto p-6" id="diff-area">
      <div id="diff-container"></div>
      <div id="empty-state" class="hidden text-center text-gray-400 mt-24">
        <p class="text-lg">No diff loaded yet.</p>
        <p class="text-sm mt-1">Call <code>create_review()</code> from Claude to start a review.</p>
      </div>
    </main>
  </div>

  <!-- Overview panel (sibling of diff-panel inside main-panels) -->
  <div id="overview-panel" class="hidden h-full overflow-y-auto p-6 bg-gray-50">
    <!-- General comments -->
    <div class="max-w-3xl mx-auto mb-8">
      <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">General Comments</h2>
      <div id="general-comment-list" class="space-y-3 mb-4"></div>
      <p id="general-empty" class="text-xs text-gray-400 mb-4 hidden">No general comments yet.</p>
      <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
        <textarea id="general-comment-input" class="w-full text-sm border border-gray-200 rounded p-2 resize-y min-h-[80px] focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="Add a general comment not tied to any line…"></textarea>
        <div class="flex justify-end mt-2">
          <button onclick="postGeneralComment()" class="px-4 py-1.5 bg-indigo-600 text-white text-sm rounded hover:bg-indigo-700 transition">Comment</button>
        </div>
      </div>
    </div>
    <!-- Line comments grouped by file -->
    <div class="max-w-3xl mx-auto">
      <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">Line Comments</h2>
      <div id="overview-file-list"></div>
      <p id="overview-line-empty" class="text-xs text-gray-400 text-center py-4 hidden">No line comments yet. Click any line in the diff to add one.</p>
    </div>
  </div>

</div>

<!-- Inline comment template (hidden) -->
<template id="comment-form-tpl">
  <div class="comment-form-row">
    <div class="inline-comment-box mt-1 mx-4">
      <textarea class="w-full text-sm border border-gray-300 rounded p-2 resize-y min-h-[60px] focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="Leave a comment…"></textarea>
      <div class="flex items-center justify-between mt-2">
        <div class="flex gap-1 comment-type-selector" data-selected="suggestion">
          <button type="button" data-type="nitpick">nitpick</button>
          <button type="button" data-type="suggestion">suggestion</button>
          <button type="button" data-type="blocker">blocker</button>
        </div>
        <div class="flex gap-2">
          <button class="btn-cancel text-xs text-gray-500 hover:text-gray-700">Cancel</button>
          <button class="btn-submit px-3 py-1 bg-indigo-600 text-white text-xs rounded hover:bg-indigo-700">Submit</button>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
// ---------------------------------------------------------------------------
// Dark mode
// ---------------------------------------------------------------------------
function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  document.getElementById("btn-dark-toggle").textContent = isDark ? "☀️" : "🌙";
}

(function applyStoredTheme() {
  const stored = localStorage.getItem("theme");
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  if (stored === "dark" || (!stored && prefersDark)) {
    document.documentElement.classList.add("dark");
  }
})();

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------
const TYPE_BADGE_CLS = { nitpick: "type-badge type-badge-nitpick", suggestion: "type-badge type-badge-suggestion", blocker: "type-badge type-badge-blocker" };

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let diffData = null;
let comments = [];
let reviewStatus = "pending";
let activeFormRow = null;
let diffFormat = localStorage.getItem("diffFormat") || "side-by-side";
let activeTab = "diff";

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
async function init() {
  document.getElementById("btn-dark-toggle").textContent =
    document.documentElement.classList.contains("dark") ? "☀️" : "🌙";
  updateTabUI();
  updateFormatToggleUI();
  await loadDiff();
  await refreshComments();
  setInterval(refreshComments, 3000);
  document.addEventListener("input", e => {
    if (e.target.tagName === "TEXTAREA" && !hasUnsavedComment())
      dismissUnsavedWarning();
  });
}

// ---------------------------------------------------------------------------
// Load diff
// ---------------------------------------------------------------------------
async function loadDiff() {
  try {
    const res = await fetch("/diff");
    diffData = await res.json();
  } catch (e) {
    showEmpty();
    return;
  }

  const files = diffData.files || [];
  if (!files.length) { showEmpty(); return; }

  if (diffData.base_ref || diffData.head_ref) {
    document.getElementById("ref-range").textContent =
      `${diffData.base_ref ?? "main"} → ${diffData.head_ref ?? "HEAD"}`;
  }

  const titleTile = document.getElementById("title-tile");
  const titleText = document.getElementById("title-text");
  if (diffData.title) {
    titleText.textContent = diffData.title;
    titleTile.classList.remove("hidden");
    document.getElementById("main-panels").style.height = `calc(100vh - 57px - ${titleTile.offsetHeight || 37}px)`;
  }

  renderFileTree(files);
  renderDiff(files);
  attachLineClickHandlers();
}

function showEmpty() {
  document.getElementById("empty-state").classList.remove("hidden");
}

// ---------------------------------------------------------------------------
// Tab switcher
// ---------------------------------------------------------------------------
function updateTabUI() {
  const isDiff = activeTab === "diff";
  document.getElementById("btn-tab-overview").className =
    `px-3 py-1.5 transition ${!isDiff ? "bg-indigo-600 text-white" : "text-gray-600 hover:bg-gray-100"}`;
  document.getElementById("btn-tab-diff").className =
    `px-3 py-1.5 border-l border-gray-300 transition ${isDiff ? "bg-indigo-600 text-white" : "text-gray-600 hover:bg-gray-100"}`;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("diff-panel").classList.toggle("hidden", tab !== "diff");
  document.getElementById("overview-panel").classList.toggle("hidden", tab !== "overview");
  updateTabUI();
  if (tab === "overview") renderOverview();
}

// ---------------------------------------------------------------------------
// Diff format toggle
// ---------------------------------------------------------------------------
function updateFormatToggleUI() {
  const isSide = diffFormat === "side-by-side";
  document.getElementById("btn-fmt-side").className =
    `px-3 py-1.5 transition ${isSide ? "bg-indigo-600 text-white" : "text-gray-600 hover:bg-gray-100"}`;
  document.getElementById("btn-fmt-unified").className =
    `px-3 py-1.5 border-l border-gray-300 transition ${!isSide ? "bg-indigo-600 text-white" : "text-gray-600 hover:bg-gray-100"}`;
}

function setDiffFormat(fmt) {
  if (fmt === diffFormat) return;
  diffFormat = fmt;
  localStorage.setItem("diffFormat", fmt);
  updateFormatToggleUI();
  if (diffData) {
    renderDiff(diffData.files || []);
    renderCommentThreads();
  }
}

// ---------------------------------------------------------------------------
// File tree
// ---------------------------------------------------------------------------
const STATUS_COLORS = { added: "#22c55e", deleted: "#ef4444", modified: "#f59e0b" };

function buildTree(files) {
  const root = {};
  files.forEach((f, i) => {
    const parts = f.filename.split("/");
    let node = root;
    parts.forEach((part, j) => {
      if (j === parts.length - 1) {
        node[part] = { _idx: i, _status: f.status || "modified" };
      } else {
        if (!node[part] || node[part]._idx != null) node[part] = {};
        node = node[part];
      }
    });
  });
  return root;
}

function renderTreeNode(container, node, depth) {
  const entries = Object.entries(node).sort(([an, av], [bn, bv]) => {
    const aDir = !("_idx" in av), bDir = !("_idx" in bv);
    if (aDir !== bDir) return aDir ? -1 : 1;
    return an.localeCompare(bn);
  });

  entries.forEach(([name, value]) => {
    if (name.startsWith("_")) return;
    const pad = `${8 + depth * 12}px`;

    if ("_idx" in value) {
      const a = document.createElement("a");
      a.href = `#file-${value._idx}`;
      a.className = "flex items-center gap-1.5 text-xs py-1 rounded cursor-pointer text-indigo-700 truncate";
      a.style.paddingLeft = pad;
      a.dataset.fileIdx = value._idx;

      const dot = document.createElement("span");
      dot.style.cssText = `color:${STATUS_COLORS[value._status] || STATUS_COLORS.modified};font-size:9px;flex-shrink:0;line-height:1`;
      dot.textContent = "●";

      const label = document.createElement("span");
      label.className = "truncate";
      label.textContent = name;

      a.appendChild(dot);
      a.appendChild(label);
      a.onclick = () => {
        document.querySelectorAll("#file-list a").forEach(x => x.classList.remove("active"));
        a.classList.add("active");
      };
      container.appendChild(a);
    } else {
      const wrap = document.createElement("div");

      const header = document.createElement("div");
      header.className = "flex items-center gap-1 text-xs py-1 cursor-pointer text-gray-500 hover:text-gray-700 select-none";
      header.style.paddingLeft = pad;

      const arrow = document.createElement("span");
      arrow.className = "text-gray-400 flex-shrink-0";
      arrow.style.fontSize = "9px";
      arrow.textContent = "▾";

      const label = document.createElement("span");
      label.className = "truncate font-medium";
      label.textContent = name + "/";

      header.appendChild(arrow);
      header.appendChild(label);

      const children = document.createElement("div");
      renderTreeNode(children, value, depth + 1);

      header.onclick = () => {
        const collapsed = children.style.display === "none";
        children.style.display = collapsed ? "" : "none";
        arrow.textContent = collapsed ? "▾" : "▸";
      };

      wrap.appendChild(header);
      wrap.appendChild(children);
      container.appendChild(wrap);
    }
  });
}

function renderFileTree(files) {
  const list = document.getElementById("file-list");
  list.innerHTML = "";
  renderTreeNode(list, buildTree(files), 0);
}

// ---------------------------------------------------------------------------
// Diff rendering
// ---------------------------------------------------------------------------
function buildUnifiedDiff(files) {
  return files.map(f => {
    const hunks = f.hunks.map(h => {
      const lines = h.lines.map(l => {
        const prefix = l.type === "add" ? "+" : l.type === "remove" ? "-" : " ";
        return prefix + l.content;
      }).join("\n");
      return `${h.header}\n${lines}`;
    }).join("\n");
    return `diff --git a/${f.filename} b/${f.filename}\n--- a/${f.filename}\n+++ b/${f.filename}\n${hunks}`;
  }).join("\n");
}

function renderDiff(files) {
  const container = document.getElementById("diff-container");
  container.innerHTML = "";

  files.forEach((f, fileIdx) => {
    const wrapper = document.createElement("div");
    wrapper.id = `file-${fileIdx}`;
    wrapper.className = "mb-6";

    const singleFileDiff = buildUnifiedDiff([f]);
    const scrollContainer = document.createElement("div");
    scrollContainer.className = "diff-scroll-container";
    const targetEl = document.createElement("div");
    targetEl.style.position = 'relative';
    scrollContainer.appendChild(targetEl);
    wrapper.appendChild(scrollContainer);
    container.appendChild(wrapper);

    const ui = new Diff2HtmlUI(targetEl, singleFileDiff, {
      drawFileList: false,
      matching: "lines",
      outputFormat: diffFormat,
      highlight: true,
      renderNothingWhenEmpty: false,
    });
    ui.draw();
    ui.highlightCode();

    // Inject per-file approve button into the file header
    const fileHeader = targetEl.querySelector(".d2h-file-header");
    if (fileHeader) {
      const btn = document.createElement("button");
      btn.id = `approve-file-${fileIdx}`;
      btn.dataset.filename = f.filename;
      btn.className = "approve-file-btn ml-3 px-2 py-0.5 text-xs rounded border border-green-400 text-green-700 hover:bg-green-50 transition disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap";
      btn.textContent = "Approve file";
      btn.onclick = () => approveFile(f.filename, btn);
      fileHeader.appendChild(btn);
    }

    injectExpandButtons(f, targetEl);
    attachPhantomScrollbar(scrollContainer);

    // Tag each code td with file/line data for click-to-comment.
    if (diffFormat === "side-by-side") {
      const sideDiffs = Array.from(targetEl.querySelectorAll(".d2h-file-side-diff"));
      targetEl.querySelectorAll(".d2h-code-side-linenumber").forEach(lineNoCell => {
        const codeTd = lineNoCell.nextElementSibling;
        if (!codeTd) return;
        const lineNo = parseInt(lineNoCell.textContent.trim());
        if (!(lineNo > 0)) return;
        const parentSideDiff = lineNoCell.closest(".d2h-file-side-diff");
        const side = sideDiffs.indexOf(parentSideDiff) === 0 ? "left" : "right";
        codeTd.dataset.file = f.filename;
        codeTd.dataset.fileIdx = fileIdx;
        codeTd.dataset.line = lineNo;
        codeTd.dataset.side = side;
      });
    } else {
      // Unified (line-by-line): rows have [old-linenum?, new-linenum?, code] tds.
      // Only tag rows that have a NEW line number (skip removed lines) so that
      // comment threads always anchor to the right row.
      targetEl.querySelectorAll("tr").forEach(row => {
        const tds = Array.from(row.querySelectorAll("td"));
        if (tds.length < 2) return;
        const codeTd = tds[tds.length - 1];
        const lineNoCells = tds.slice(0, -1);
        // lastLineNoCell holds the new-side line number.
        // It may be a single td with two child divs (one td per row) or the
        // rightmost of two separate tds. Either way, read the last child element
        // if children exist, otherwise read the full textContent.
        const lastCell = lineNoCells[lineNoCells.length - 1];
        if (!lastCell) return;
        const kids = Array.from(lastCell.children).filter(el => el.textContent.trim());
        const newLineText = kids.length
          ? kids[kids.length - 1].textContent.trim()
          : (lastCell.textContent.trim().split(/\s+/).filter(Boolean).pop() || "");
        const lineNo = parseInt(newLineText);
        if (!(lineNo > 0)) return; // removed lines have blank new-number → skip
        codeTd.dataset.file = f.filename;
        codeTd.dataset.fileIdx = fileIdx;
        codeTd.dataset.line = lineNo;
        codeTd.dataset.side = "right";
      });
    }
  });
}

// ---------------------------------------------------------------------------
// Expand context
// ---------------------------------------------------------------------------

function hunkNewRange(hunk) {
  const newLines = hunk.lines.filter(l => l.new_line !== null).map(l => l.new_line);
  if (!newLines.length) return null;
  return { start: newLines[0], end: newLines[newLines.length - 1] };
}

function injectExpandButtons(f, targetEl) {
  const ranges = f.hunks.map(hunkNewRange);
  if (!ranges.length) return;
  const ref = (diffData && diffData.head_ref) || "HEAD";
  const isSide = diffFormat === "side-by-side";

  if (isSide) {
    const sideDivs = Array.from(targetEl.querySelectorAll(".d2h-file-side-diff"));
    if (sideDivs.length < 2) return;
    const tables = sideDivs.map(d => d.querySelector("table.d2h-diff-table")).filter(Boolean);
    if (tables.length < 2) return;
    const allTbodies = tables.map(t => Array.from(t.querySelectorAll("tbody")));

    const insertPair = (gapStart, gapEnd, beforeIdx) => {
      const pid = "ep-" + Math.random().toString(36).slice(2);
      const e0 = makeExpandTbody(f.filename, gapStart, gapEnd, ref, 2, "side", pid + "L", true);
      const e1 = makeExpandTbody(f.filename, gapStart, gapEnd, ref, 2, "side", pid + "R", false);
      e0.dataset.pairedId = pid + "R";
      e1.dataset.pairedId = pid + "L";
      if (beforeIdx != null) {
        tables[0].insertBefore(e0, allTbodies[0][beforeIdx]);
        tables[1].insertBefore(e1, allTbodies[1][beforeIdx]);
      } else {
        tables[0].appendChild(e0);
        tables[1].appendChild(e1);
      }
    };

    const firstRange = ranges.find(r => r !== null);
    if (firstRange && firstRange.start > 3)
      insertPair(1, firstRange.start - 1, 0);
    const lastRange = ranges.filter(Boolean).pop();
    if (lastRange && f.total_lines != null && lastRange.end < f.total_lines)
      insertPair(lastRange.end + 1, f.total_lines, null);

  } else {
    const table = targetEl.querySelector("table.d2h-diff-table");
    if (!table) return;
    const tbodies = Array.from(table.querySelectorAll("tbody"));

    const firstRange = ranges.find(r => r !== null);
    if (firstRange && firstRange.start > 3)
      table.insertBefore(makeExpandTbody(f.filename, 1, firstRange.start - 1, ref, 3, "unified", null), tbodies[0]);
    const lastRange = ranges.filter(Boolean).pop();
    if (lastRange && f.total_lines != null && lastRange.end < f.total_lines)
      table.appendChild(makeExpandTbody(f.filename, lastRange.end + 1, f.total_lines, ref, 3, "unified", null));
  }
}

function makeExpandTbody(file, gapStart, gapEnd, ref, cols, mode, selfId, active = true) {
  const tbody = document.createElement("tbody");
  tbody.className = "expand-ctx-tbody";
  if (selfId) tbody.id = selfId;
  tbody.dataset.file = file;
  tbody.dataset.gapStart = gapStart;
  tbody.dataset.gapEnd = String(gapEnd);
  tbody.dataset.ref = ref;
  tbody.dataset.cols = cols;
  tbody.dataset.mode = mode;
  const tr = document.createElement("tr");
  tr.className = "expand-ctx-row";
  const td = document.createElement("td");
  td.colSpan = cols;
  td.className = "expand-ctx-cell";
  if (active) {
    const btn = document.createElement("button");
    btn.className = "expand-ctx-btn";
    btn.onclick = () => expandContext(tbody);
    setExpandBtnText(btn, gapStart, gapEnd);
    td.appendChild(btn);
  }
  tr.appendChild(td);
  tbody.appendChild(tr);
  return tbody;
}

function setExpandBtnText(btn, start, end) {
  const endNum = (end === Infinity || String(end) === "Infinity") ? null : Number(end);
  if (endNum === null || endNum < start) {
    btn.textContent = "↓ Load more lines";
  } else {
    const n = endNum - Number(start) + 1;
    btn.textContent = `↕ ${n} hidden line${n !== 1 ? "s" : ""}`;
  }
}

async function expandContext(tbody) {
  const file = tbody.dataset.file;
  const gapStart = parseInt(tbody.dataset.gapStart);
  const gapEnd = tbody.dataset.gapEnd === "Infinity" ? null : parseInt(tbody.dataset.gapEnd);
  const ref = tbody.dataset.ref;
  const cols = parseInt(tbody.dataset.cols);
  const mode = tbody.dataset.mode;
  const pairedId = tbody.dataset.pairedId;

  const fetchEnd = gapEnd !== null ? Math.min(gapStart + 14, gapEnd) : gapStart + 14;

  let data;
  try {
    const res = await fetch(
      `/file-lines?file=${encodeURIComponent(file)}&start=${gapStart}&end=${fetchEnd}&ref=${encodeURIComponent(ref)}`
    );
    data = await res.json();
  } catch (_) { return; }

  if (data.error || !data.lines || !data.lines.length) {
    if (pairedId) document.getElementById(pairedId)?.remove();
    tbody.remove();
    return;
  }

  const total = data.total_lines;
  const newStart = data.lines[data.lines.length - 1].line_no + 1;
  const newEnd = gapEnd !== null ? gapEnd : total;

  const insertLines = (target) => {
    data.lines.forEach(line => {
      target.parentElement.insertBefore(makeContextRow(line.line_no, line.content, cols, mode), target);
    });
  };

  insertLines(tbody);

  if (pairedId) {
    const paired = document.getElementById(pairedId);
    if (paired) {
      insertLines(paired);
      updateOrRemoveExpandTbody(paired, newStart, newEnd);
    }
  }

  updateOrRemoveExpandTbody(tbody, newStart, newEnd);
}

function updateOrRemoveExpandTbody(tbody, newStart, newEnd) {
  if (newStart > newEnd) {
    tbody.remove();
  } else {
    tbody.dataset.gapStart = newStart;
    tbody.dataset.gapEnd = newEnd;
    const btn = tbody.querySelector(".expand-ctx-btn");
    if (btn) setExpandBtnText(btn, newStart, newEnd);
  }
}

function makeContextRow(lineNo, content, cols, mode) {
  const tr = document.createElement("tr");
  tr.className = "expand-ctx-line";

  if (mode === "side") {
    const tdN = document.createElement("td");
    tdN.className = "d2h-code-side-linenumber";
    tdN.style.cssText = "color:#9ca3af;font-size:0.75rem;text-align:right;padding:0 8px;user-select:none;min-width:3em;";
    tdN.textContent = lineNo;
    const tdC = document.createElement("td");
    tdC.className = "d2h-code-side-diff";
    const pre = document.createElement("pre");
    pre.className = "d2h-code-line";
    const span = document.createElement("span");
    span.className = "d2h-code-line-ctn";
    span.textContent = content || "\u00a0";
    pre.appendChild(span);
    tdC.appendChild(pre);
    tr.appendChild(tdN);
    tr.appendChild(tdC);
  } else {
    ["num1", "num2"].forEach(cls => {
      const tdN = document.createElement("td");
      tdN.className = "d2h-code-linenumber";
      tdN.style.cssText = "color:#9ca3af;font-size:0.75rem;padding:0 4px;";
      const div = document.createElement("div");
      div.className = `line-${cls}`;
      div.textContent = lineNo;
      tdN.appendChild(div);
      tr.appendChild(tdN);
    });
    const tdC = document.createElement("td");
    tdC.className = "d2h-code-side-diff";
    const pre = document.createElement("pre");
    pre.className = "d2h-code-line";
    const span = document.createElement("span");
    span.className = "d2h-code-line-ctn";
    span.textContent = content || "\u00a0";
    pre.appendChild(span);
    tdC.appendChild(pre);
    tr.appendChild(tdC);
  }

  return tr;
}

// ---------------------------------------------------------------------------
// Inline comment form
// ---------------------------------------------------------------------------
function attachLineClickHandlers() {
  document.getElementById("diff-container").addEventListener("click", e => {
    const cell = e.target.closest("td[data-file]");
    if (!cell || !cell.dataset.line) return;
    const file = cell.dataset.file;
    const line = parseInt(cell.dataset.line);
    const row = cell.closest("tr");
    if (!row) return;
    openCommentForm(row, file, line, cell);
  });
}

function openCommentForm(row, file, line, clickedCell = null) {
  // Remove any existing open form
  if (activeFormRow) {
    activeFormRow.remove();
    activeFormRow = null;
  }

  const tpl = document.getElementById("comment-form-tpl");
  const formRow = tpl.content.cloneNode(true).querySelector(".comment-form-row");

  const colspan = row.cells.length || 2;
  const isRightSide = clickedCell && clickedCell.dataset.side === "right";

  const tr = document.createElement("tr");
  const td = document.createElement("td");
  td.colSpan = colspan;
  td.appendChild(formRow);
  tr.appendChild(td);

  row.insertAdjacentElement("afterend", tr);
  activeFormRow = tr;

  const textarea = tr.querySelector("textarea");
  textarea.focus();
  const scrollContainer = tr.closest(".diff-scroll-container");
  if (scrollContainer) scrollContainer.scrollLeft = 0;

  // Offset the sticky form so it starts just right of the line-number columns
  const lineNoCells = Array.from(row.querySelectorAll(".d2h-code-side-linenumber, .d2h-code-linenumber"));
  const lineNoWidth = lineNoCells.reduce((sum, el) => sum + el.offsetWidth, 0);
  const box = tr.querySelector(".inline-comment-box");
  const gap = 8;
  box.style.left = `${lineNoWidth + gap}px`;
  box.style.maxWidth = `calc(min(600px, 100vw - ${lineNoWidth + gap * 2}px))`;

  tr.querySelector(".btn-cancel").onclick = () => { tr.remove(); activeFormRow = null; };

  // Type selector — CSS handles active styling via data-selected attribute
  const typeSelector = tr.querySelector(".comment-type-selector");
  tr.querySelectorAll("[data-type]").forEach(btn => {
    btn.onclick = () => { typeSelector.dataset.selected = btn.dataset.type; };
  });

  const side = isRightSide ? "right" : "left";
  tr.querySelector(".btn-submit").onclick = async () => {
    const text = textarea.value.trim();
    if (!text) return;
    const commentType = typeSelector.dataset.selected || "suggestion";
    const newComment = await postComment(file, line, text, null, side, commentType);
    // Mark the anchor row with the new comment's ID so renderCommentThreads
    // can find the exact row without re-searching by line number.
    if (newComment?.id) row.dataset.commentAnchorId = newComment.id;
    tr.remove();
    activeFormRow = null;
    await refreshComments();
  };
}

async function postComment(file, line, comment, parentId = null, side = "left", commentType = "suggestion") {
  const res = await fetch("/comments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file, line, comment, ...(parentId && { parent_id: parentId }), side, comment_type: commentType }),
  });
  return res.ok ? res.json() : null;
}

// ---------------------------------------------------------------------------
// Status buttons
// ---------------------------------------------------------------------------
function hasUnsavedComment() {
  const textareas = document.querySelectorAll("textarea");
  return Array.from(textareas).some(t => t.value.trim().length > 0);
}

function showUnsavedWarning(status) {
  const warning = document.getElementById("unsaved-warning");
  const proceed = document.getElementById("unsaved-proceed");
  proceed.onclick = () => { dismissUnsavedWarning(); submitStatus(status, true); };
  warning.classList.remove("hidden");
}

function dismissUnsavedWarning() {
  document.getElementById("unsaved-warning").classList.add("hidden");
}

async function submitStatus(status, force = false) {
  if (!force && hasUnsavedComment()) {
    showUnsavedWarning(status);
    return;
  }
  dismissUnsavedWarning();
  const btnApprove = document.getElementById("btn-approve");
  const btnChanges = document.getElementById("btn-changes");
  btnApprove.disabled = true;
  btnChanges.disabled = true;
  btnApprove.classList.add("opacity-50", "cursor-not-allowed");
  btnChanges.classList.add("opacity-50", "cursor-not-allowed");

  await fetch("/status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status }),
  });
  updateStatusBadge(status);
}

// ---------------------------------------------------------------------------
// Auto-refresh comments
// ---------------------------------------------------------------------------
async function refreshComments() {
  try {
    const res = await fetch("/comments");
    const data = await res.json();
    comments = data.comments || [];
    reviewStatus = data.status || "pending";
    updateStatusBadge(reviewStatus);
    renderCommentThreads();
    if (activeTab === "overview") renderOverview();
    updateCommentCount();
    updateFileApproveBtns();
  } catch (e) { /* server not ready yet */ }
}

function updateStatusBadge(status) {
  const badge = document.getElementById("status-badge");
  const map = {
    pending: ["bg-yellow-100 text-yellow-800", "Pending"],
    approved: ["bg-green-100 text-green-800", "Approved"],
    changes_requested: ["bg-red-100 text-red-800", "Changes Requested"],
  };
  const [cls, label] = map[status] || map.pending;
  badge.className = `px-2 py-0.5 rounded-full text-xs font-medium ${cls}`;
  badge.textContent = label;

  if (status !== "pending") {
    document.getElementById("btn-approve").disabled = true;
    document.getElementById("btn-changes").disabled = true;
    document.getElementById("btn-approve").classList.add("opacity-50", "cursor-not-allowed");
    document.getElementById("btn-changes").classList.add("opacity-50", "cursor-not-allowed");
  }
}

function updateCommentCount() {
  const el = document.getElementById("comment-count");
  const total = comments.length;
  const resolved = comments.filter(c => c.resolved).length;
  el.textContent = total ? `${resolved}/${total} resolved` : "";
}

function renderOverview() {
  const lineComments = comments.filter(c => !c.parent_id && c.file && c.line);
  const generalComments = comments.filter(c => !c.parent_id && (!c.file || !c.line));

  // General comments
  const generalList = document.getElementById("general-comment-list");
  const generalEmpty = document.getElementById("general-empty");
  generalList.innerHTML = generalComments.map(c => {
    const aiBadge = c.source === "ai"
      ? `<span class="inline-flex items-center gap-0.5 px-1 py-0.5 rounded text-xs bg-purple-100 text-purple-700">🤖 AI</span>`
      : "";
    const resolvedBadge = c.resolved
      ? `<span class="text-xs text-green-600 ml-2">✓ Resolved</span>` : "";
    return `<div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm ${c.resolved ? "opacity-60" : ""}">
      <div class="flex items-center gap-2 mb-1">${aiBadge}${resolvedBadge}</div>
      <p class="text-sm text-gray-800 whitespace-pre-wrap">${escapeHtml(c.comment)}</p>
    </div>`;
  }).join("");
  generalEmpty.classList.toggle("hidden", generalComments.length > 0);

  // Line comments grouped by file
  const fileList = document.getElementById("overview-file-list");
  const lineEmpty = document.getElementById("overview-line-empty");

  if (!lineComments.length) {
    fileList.innerHTML = "";
    lineEmpty.classList.remove("hidden");
    return;
  }
  lineEmpty.classList.add("hidden");

  const byFile = {};
  lineComments
    .sort((a, b) => a.file < b.file ? -1 : a.file > b.file ? 1 : (a.line || 0) - (b.line || 0))
    .forEach(c => { (byFile[c.file] = byFile[c.file] || []).push(c); });

  fileList.innerHTML = Object.entries(byFile).map(([file, cs]) => `
    <div class="mb-6">
      <p class="text-xs font-semibold text-gray-500 font-mono mb-2 px-1">${escapeHtml(file)}</p>
      <div class="space-y-2">
        ${cs.map(c => {
          const aiBadge = c.source === "ai"
            ? `<span class="inline-flex items-center gap-0.5 px-1 py-0.5 rounded text-xs bg-purple-100 text-purple-700">🤖 AI</span>`
            : "";
          const resolvedBadge = c.resolved
            ? `<span class="text-xs text-green-600">✓ Resolved</span>` : "";
          const typeBadge2 = c.comment_type
            ? `<span class="${TYPE_BADGE_CLS[c.comment_type] || TYPE_BADGE_CLS.suggestion}">${c.comment_type}</span>`
            : "";
          return `<div class="bg-white border border-gray-200 rounded-lg p-3 shadow-sm cursor-pointer hover:border-indigo-400 transition-colors ${c.resolved ? "opacity-60" : ""}"
                       onclick="goToComment('${c.id}')">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs text-indigo-500 font-mono">:${c.line}</span>
              ${typeBadge2}${aiBadge}${resolvedBadge}
            </div>
            <p class="text-sm text-gray-800 line-clamp-3">${escapeHtml(c.comment)}</p>
          </div>`;
        }).join("")}
      </div>
    </div>`).join("");
}

function goToComment(id) {
  switchTab("diff");
  setTimeout(() => {
    document.getElementById(`comment-${id}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 50);
}

async function postGeneralComment() {
  const input = document.getElementById("general-comment-input");
  const text = input.value.trim();
  if (!text) return;
  await fetch("/comments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file: "", line: 0, comment: text }),
  });
  input.value = "";
  const data = await (await fetch("/comments")).json();
  comments = data.comments || [];
  renderOverview();
  updateCommentCount();
}

function buildCommentHtml(c, isReply = false, replies = []) {
  const isAI = c.source === "ai";
  const editControls = (!c.resolved && reviewStatus === "pending" && !isReply && !isAI)
    ? `<span class="comment-edit-controls flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
         <button onclick="startEditComment('${c.id}')" class="text-xs text-gray-400 hover:text-indigo-600" title="Edit">✏️</button>
         <button onclick="deleteComment('${c.id}')" class="text-xs text-gray-400 hover:text-red-600" title="Delete">🗑️</button>
       </span>`
    : "";
  const aiBadge = isAI
    ? `<span title="Posted by AI pre-review" class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-xs font-medium bg-purple-100 text-purple-700 shrink-0">🤖 AI</span>`
    : "";
  const typeBadgeHtml = (!isReply && c.comment_type)
    ? `<div style="margin-bottom:4px"><span class="${TYPE_BADGE_CLS[c.comment_type] || TYPE_BADGE_CLS.suggestion}">${c.comment_type}</span></div>`
    : "";
  const replyBtn = (!c.resolved && reviewStatus === "pending" && !isReply && !isAI)
    ? `<button onclick="openReplyForm('${c.id}')" class="text-xs text-indigo-400 hover:text-indigo-600 mt-1">Reply</button>`
    : "";
  const dismissBtn = (isAI && !c.resolved && !isReply)
    ? `<button onclick="dismissAiComment('${c.id}')" class="text-xs text-purple-400 hover:text-purple-700 mt-1">Dismiss</button>`
    : "";
  const indent = isReply ? "ml-6 border-l-2 border-indigo-200 pl-3" : "";
  const aiCls = isAI ? " ai-comment" : "";
  const repliesHtml = !isReply && replies.length
    ? `<div class="mt-1">
         <button id="toggle-replies-${c.id}" onclick="toggleReplies('${c.id}')" class="text-xs text-gray-400 hover:text-indigo-600 mb-1">▼ ${replies.length} ${replies.length === 1 ? "reply" : "replies"}</button>
         <div id="replies-${c.id}">
           ${replies.map(r => buildCommentHtml(r, true)).join("")}
         </div>
       </div>`
    : "";
  return `
    <div id="comment-${c.id}" class="comment-thread group flex flex-col gap-1 ${indent}${aiCls}">
      ${typeBadgeHtml}
      <div class="flex items-start justify-between gap-2">
        <span class="flex-1 comment-text-${c.id}">${escapeHtml(c.comment)}</span>
        ${aiBadge}
        ${c.resolved ? `<span class="resolved-badge">✓ Resolved</span>` : `<span class="resolved-badge" style="display:none">✓ Resolved</span>`}
        ${editControls}
      </div>
      ${replyBtn}${dismissBtn}
      <div id="reply-form-${c.id}" class="hidden mt-1">
        <textarea class="w-full text-sm border border-gray-300 rounded p-1 resize-y min-h-[48px]" placeholder="Reply…"></textarea>
        <div class="flex gap-2 mt-1">
          <button class="text-xs px-2 py-0.5 bg-indigo-600 text-white rounded" onclick="submitReply('${c.id}', '${c.file}', ${c.line})">Submit</button>
          <button class="text-xs px-2 py-0.5 border rounded" onclick="document.getElementById('reply-form-${c.id}').classList.add('hidden')">Cancel</button>
        </div>
      </div>
      ${repliesHtml}
    </div>`;
}

function renderCommentThreads() {
  // Only remove rows for comments that no longer exist (preserves open reply forms)
  const rootIds = new Set(comments.filter(c => !c.parent_id).map(c => c.id));
  document.querySelectorAll(".comment-thread-row").forEach(r => {
    const id = r.id.replace("thread-row-", "");
    if (!rootIds.has(id)) r.remove();
  });

  const roots = comments.filter(c => !c.parent_id);
  const repliesFor = id => comments.filter(c => c.parent_id === id);

  roots.forEach(c => {
    const side = c.side || "left";
    // Prefer the row that was explicitly marked during form submission (exact match).
    let row = document.querySelector(`tr[data-comment-anchor-id="${c.id}"]`);
    if (row) {
      delete row.dataset.commentAnchorId;
    } else {
      const cells = document.querySelectorAll(`[data-file="${CSS.escape(c.file)}"][data-line="${c.line}"][data-side="${side}"]`);
      const anchorCell = cells.length ? cells[0] : document.querySelector(`[data-file="${CSS.escape(c.file)}"][data-line="${c.line}"]`);
      if (!anchorCell) return;
      row = anchorCell.closest("tr");
    }
    if (!row) return;

    const existingRow = document.getElementById(`thread-row-${c.id}`);
    if (existingRow) {
      [c, ...repliesFor(c.id)].forEach(comment => {
        const badge = document.querySelector(`#comment-${comment.id} .resolved-badge`);
        if (badge) badge.style.display = comment.resolved ? "inline-flex" : "none";
      });
      return;
    }

    const colspan = row.cells.length || 2;
    const tr = document.createElement("tr");
    tr.id = `thread-row-${c.id}`;
    tr.className = "comment-thread-row";
    const td = document.createElement("td");
    td.colSpan = colspan;

    // Offset content past sticky line-number columns (same logic as comment form)
    const lineNoCells = Array.from(row.querySelectorAll(".d2h-code-side-linenumber, .d2h-code-linenumber"));
    const lineNoWidth = lineNoCells.reduce((sum, el) => sum + el.offsetWidth, 0);
    if (lineNoWidth > 0) td.style.paddingLeft = `${lineNoWidth + 8}px`;

    const replies = repliesFor(c.id);
    td.innerHTML = buildCommentHtml(c, false, replies);
    tr.appendChild(td);
    row.insertAdjacentElement("afterend", tr);
  });
}

function openReplyForm(parentId) {
  document.getElementById(`reply-form-${parentId}`).classList.remove("hidden");
}

function toggleReplies(parentId) {
  const container = document.getElementById(`replies-${parentId}`);
  const btn = document.getElementById(`toggle-replies-${parentId}`);
  if (!container || !btn) return;
  const collapsed = container.style.display === "none";
  container.style.display = collapsed ? "" : "none";
  const count = container.children.length;
  btn.textContent = `${collapsed ? "▼" : "▶"} ${count} ${count === 1 ? "reply" : "replies"}`;
}

async function submitReply(parentId, file, line) {
  const form = document.getElementById(`reply-form-${parentId}`);
  const textarea = form.querySelector("textarea");
  const text = textarea.value.trim();
  if (!text) return;
  await fetch("/comments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file, line, comment: text, parent_id: parentId }),
  });
  textarea.value = "";
  form.classList.add("hidden");
  // Force refresh
  const data = await (await fetch("/comments")).json();
  comments = data.comments || [];
  reviewStatus = data.status || "pending";
  document.querySelectorAll(".comment-thread-row").forEach(r => r.remove());
  renderCommentThreads();
  if (activeTab === "overview") renderOverview();
}

async function approveFile(filename, btn) {
  const res = await fetch("/approve-file", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file: filename }),
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  btn.textContent = "✓ Approved";
  btn.disabled = true;
  btn.classList.replace("border-green-400", "border-green-200");
  btn.classList.replace("text-green-700", "text-green-400");
  if (data.status === "approved") {
    reviewStatus = "approved";
    updateStatusBadge("approved");
  }
}

function updateFileApproveBtns() {
  document.querySelectorAll(".approve-file-btn").forEach(btn => {
    const filename = btn.dataset.filename;
    const hasUnresolved = comments.some(c => c.file === filename && !c.resolved);
    const isApproved = (comments.length === 0 ? false : false) ||
      btn.textContent.includes("✓") ||
      reviewStatus !== "pending";
    btn.disabled = hasUnresolved || isApproved || reviewStatus !== "pending";
  });
}

async function startEditComment(id) {
  const span = document.querySelector(`.comment-text-${id}`);
  if (!span) return;
  const original = span.textContent;
  span.innerHTML = `
    <textarea class="w-full text-sm border border-gray-300 rounded p-1 resize-y min-h-[50px]">${escapeHtml(original)}</textarea>
    <div class="flex gap-2 mt-1">
      <button class="text-xs px-2 py-0.5 bg-indigo-600 text-white rounded" onclick="saveEditComment('${id}', this)">Save</button>
      <button class="text-xs px-2 py-0.5 border rounded" onclick="cancelEditComment('${id}', ${JSON.stringify(original)})">Cancel</button>
    </div>`;
}

function cancelEditComment(id, original) {
  const span = document.querySelector(`.comment-text-${id}`);
  if (span) span.innerHTML = escapeHtml(original);
}

async function saveEditComment(id, btn) {
  const span = btn.closest(`.comment-text-${id}`);
  const textarea = span ? span.querySelector("textarea") : null;
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) return;
  const res = await fetch(`/comments/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ comment: text }),
  });
  if (res.ok) {
    // Poll will re-render; force immediate refresh
    const data = await (await fetch("/comments")).json();
    comments = data.comments || [];
    reviewStatus = data.status;
    document.querySelectorAll(".comment-thread-row").forEach(r => r.remove());
    renderCommentThreads();
  }
}

async function dismissAiComment(id) {
  await fetch("/resolve", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id }),
  });
  await refreshComments();
}

async function deleteComment(id) {
  if (!confirm("Delete this comment?")) return;
  await fetch(`/comments/${id}`, { method: "DELETE" });
  const data = await (await fetch("/comments")).json();
  comments = data.comments || [];
  document.getElementById(`comment-${id}`)?.remove();
  updateCommentCount();
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ---------------------------------------------------------------------------
// Phantom scrollbar
// ---------------------------------------------------------------------------
function attachPhantomScrollbar(scrollContainer) {
  const wrap = document.createElement('div');
  wrap.className = 'phantom-scrollbar-wrap';
  const inner = document.createElement('div');
  inner.className = 'phantom-scrollbar-inner';
  wrap.appendChild(inner);
  scrollContainer.insertAdjacentElement('afterend', wrap);

  function updateWidth() {
    const hasOverflow = scrollContainer.scrollWidth > scrollContainer.clientWidth;
    wrap.style.display = hasOverflow ? '' : 'none';
    inner.style.width = scrollContainer.scrollWidth + 'px';
  }

  updateWidth();

  let syncing = false;
  wrap.addEventListener('scroll', () => {
    if (syncing) return;
    syncing = true;
    scrollContainer.scrollLeft = wrap.scrollLeft;
    syncing = false;
  });
  scrollContainer.addEventListener('scroll', () => {
    if (syncing) return;
    syncing = true;
    wrap.scrollLeft = scrollContainer.scrollLeft;
    syncing = false;
  });

  const ro = new ResizeObserver(updateWidth);
  ro.observe(scrollContainer);
}

// ---------------------------------------------------------------------------
// Keyboard shortcuts
// ---------------------------------------------------------------------------
let _activeFileIdx = 0;
let _activeCommentIdx = -1;

function _isTyping() {
  const el = document.activeElement;
  return el && (el.tagName === "TEXTAREA" || el.tagName === "INPUT" || el.isContentEditable);
}

function _commentRows() {
  return Array.from(document.querySelectorAll(".comment-thread-row"))
    .filter(r => r.offsetParent !== null);
}

function _fileLinks() {
  return Array.from(document.querySelectorAll("#file-list a[data-file-idx]"));
}

function _scrollToRow(row) {
  row.scrollIntoView({ behavior: "smooth", block: "center" });
}

function kbNextComment() {
  const rows = _commentRows();
  if (!rows.length) return;
  _activeCommentIdx = Math.min(_activeCommentIdx + 1, rows.length - 1);
  _scrollToRow(rows[_activeCommentIdx]);
}

function kbPrevComment() {
  const rows = _commentRows();
  if (!rows.length) return;
  _activeCommentIdx = Math.max(_activeCommentIdx - 1, 0);
  _scrollToRow(rows[_activeCommentIdx]);
}

function kbNextFile() {
  const links = _fileLinks();
  if (!links.length) return;
  _activeFileIdx = Math.min(_activeFileIdx + 1, links.length - 1);
  links[_activeFileIdx].click();
  document.getElementById(`file-${links[_activeFileIdx].dataset.fileIdx}`)
    ?.scrollIntoView({ behavior: "smooth", block: "start" });
}

function kbPrevFile() {
  const links = _fileLinks();
  if (!links.length) return;
  _activeFileIdx = Math.max(_activeFileIdx - 1, 0);
  links[_activeFileIdx].click();
  document.getElementById(`file-${links[_activeFileIdx].dataset.fileIdx}`)
    ?.scrollIntoView({ behavior: "smooth", block: "start" });
}

document.addEventListener("keydown", e => {
  // Always allow Esc to close comment form
  if (e.key === "Escape") {
    if (activeFormRow) { activeFormRow.remove(); activeFormRow = null; }
    return;
  }
  if (_isTyping()) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  switch (e.key) {
    case "n": e.preventDefault(); kbNextComment(); break;
    case "p": e.preventDefault(); kbPrevComment(); break;
    case "j": e.preventDefault(); kbNextFile();    break;
    case "k": e.preventDefault(); kbPrevFile();    break;
    case "a": e.preventDefault(); submitStatus("approved");          break;
    case "r": e.preventDefault(); submitStatus("changes_requested"); break;
    case "?": e.preventDefault(); toggleShortcutLegend(); break;
  }
});

function toggleShortcutLegend() {
  const el = document.getElementById("shortcut-legend");
  if (el) el.remove();
  else {
    const div = document.createElement("div");
    div.id = "shortcut-legend";
    div.style.cssText = "position:fixed;bottom:1rem;right:1rem;background:#1e293b;color:#e2e8f0;border-radius:8px;padding:12px 16px;font-size:0.75rem;z-index:9999;line-height:1.8;box-shadow:0 4px 12px rgba(0,0,0,.3)";
    div.innerHTML = `<div style="font-weight:700;margin-bottom:6px;color:#94a3b8;letter-spacing:.05em">SHORTCUTS</div>
      <div><kbd style="background:#334155;padding:1px 5px;border-radius:3px">n</kbd> / <kbd style="background:#334155;padding:1px 5px;border-radius:3px">p</kbd> &nbsp;next / prev comment</div>
      <div><kbd style="background:#334155;padding:1px 5px;border-radius:3px">j</kbd> / <kbd style="background:#334155;padding:1px 5px;border-radius:3px">k</kbd> &nbsp;next / prev file</div>
      <div><kbd style="background:#334155;padding:1px 5px;border-radius:3px">a</kbd> &nbsp;approve</div>
      <div><kbd style="background:#334155;padding:1px 5px;border-radius:3px">r</kbd> &nbsp;request changes</div>
      <div><kbd style="background:#334155;padding:1px 5px;border-radius:3px">Esc</kbd> &nbsp;close comment form</div>
      <div><kbd style="background:#334155;padding:1px 5px;border-radius:3px">?</kbd> &nbsp;toggle this panel</div>
      <div style="margin-top:6px;color:#64748b;font-size:0.68rem">Click anywhere to close</div>`;
    div.onclick = () => div.remove();
    document.body.appendChild(div);
  }
}

// ---------------------------------------------------------------------------
// Start
// ---------------------------------------------------------------------------
init();
</script>
